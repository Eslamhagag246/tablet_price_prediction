name: Daily Price Update (Optimized)

# Runs every day at 3 AM UTC
on:
  schedule:
    - cron: '1 40 * * *'
  workflow_dispatch:  # Manual trigger option

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # 2. Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install pandas playwright
          playwright install chromium
      
      # 4. Run optimized scraper
      - name: Run scraper
        run: |
          python optimized_final_scraper.py
        continue-on-error: false
      
      # 5. Commit and push if changes
      - name: Commit and push changes
        run: |
          git config --local user.name "Price Tracker Bot"
          git config --local user.email "bot@pricetracker.com"
          git add tablets_full_continuous_series.csv
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update prices: $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ Prices updated and pushed"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 6. Notify on failure (optional)
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Scraping failed on $(date)"
